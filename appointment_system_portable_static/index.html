<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>在线预约系统</title>
  <style>
    :root{--bg:#eef3fb;--card:#fff;--text:#152033;--muted:#64748b;--line:#e5e7eb;--blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--red:#dc2626;--orange:#f59e0b;--shadow:0 18px 45px rgba(15,23,42,.10);--radius:20px}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,#dbeafe 0,#eef3fb 30%,#f8fafc 100%)}
    button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.hidden{display:none!important}.muted{color:var(--muted)}.small{font-size:13px}.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700}.danger{color:var(--red)}.ok{color:var(--green)}
    .btn{background:var(--blue);color:#fff;border-radius:12px;padding:10px 14px;font-weight:800;box-shadow:0 8px 16px rgba(37,99,235,.20)}.btn:hover{background:var(--blue2)}.btn.secondary{background:#f1f5f9;color:#0f172a;box-shadow:none}.btn.danger{background:#fee2e2;color:#991b1b;box-shadow:none}.btn.green{background:#dcfce7;color:#166534;box-shadow:none}.btn.ghost{background:transparent;color:var(--blue);box-shadow:none}.btn:disabled{opacity:.5;cursor:not-allowed}
    .auth-page{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;gap:34px;align-items:center;padding:42px;max-width:1180px;margin:0 auto}.hero h1{font-size:52px;line-height:1.05;margin:0 0 18px}.hero p{font-size:18px;color:var(--muted);line-height:1.8}.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:34px}.hero-box{background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.8);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.hero-box b{display:block;font-size:24px;margin-bottom:5px;color:var(--blue)}
    .auth-card{background:var(--card);border-radius:28px;padding:28px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.8)}.auth-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.auth-title h2{margin:0;font-size:28px}.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#f1f5f9;padding:6px;border-radius:16px}.role-tabs button{padding:10px;border-radius:12px;background:transparent;font-weight:900;color:#475569}.role-tabs button.active{background:#fff;color:var(--blue);box-shadow:0 4px 12px rgba(15,23,42,.08)}.form{display:grid;gap:12px;margin-top:18px}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:7px;color:#334155}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px 13px;background:#fff;outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px #dbeafe}.switch-line{margin-top:14px;text-align:center;color:var(--muted)}.switch-line a{color:var(--blue);font-weight:900;text-decoration:none}
    .app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.sidebar{padding:22px;background:rgba(255,255,255,.76);backdrop-filter:blur(18px);border-right:1px solid rgba(226,232,240,.9);position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#06b6d4);display:grid;place-items:center;color:#fff;font-weight:900}.brand h2{font-size:18px;margin:0}.nav{display:grid;gap:8px}.nav button{text-align:left;border-radius:14px;padding:13px 14px;background:transparent;color:#475569;font-weight:800}.nav button.active{background:#e0ecff;color:#1d4ed8}.profile{position:absolute;left:22px;right:22px;bottom:22px;background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px}.main{padding:26px 34px 90px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.topbar h1{margin:0;font-size:30px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}.stat{background:var(--card);border:1px solid #eef2f7;border-radius:var(--radius);padding:20px;box-shadow:0 10px 25px rgba(15,23,42,.05)}.stat b{font-size:30px}.panel{background:var(--card);border:1px solid #eef2f7;border-radius:var(--radius);box-shadow:0 10px 30px rgba(15,23,42,.06);padding:20px;margin-bottom:18px}.panel h2{margin:0 0 14px;font-size:22px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.toolbar input,.toolbar select{border:1px solid var(--line);border-radius:13px;padding:11px 12px;background:#fff;min-width:220px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{border:1px solid #e9eef6;border-radius:18px;padding:16px;background:#fff}.card h3{margin:0 0 7px;font-size:18px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.slot-list{display:grid;gap:8px;margin-top:12px}.slot{border:1px solid #dbe4f0;border-radius:14px;padding:10px;background:#f8fbff;display:flex;align-items:center;justify-content:space-between;gap:10px}.slot.disabled{opacity:.55}.list{display:grid;gap:12px}.list-item{display:flex;justify-content:space-between;gap:14px;border:1px solid #e9eef6;border-radius:16px;padding:14px;background:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.week label{display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);border-radius:12px;padding:10px;background:#f8fafc}.toast{position:fixed;top:20px;right:20px;background:#0f172a;color:#fff;padding:13px 16px;border-radius:14px;box-shadow:var(--shadow);z-index:99;max-width:360px}.mobile-nav{display:none}
    @media(max-width:920px){.auth-page{grid-template-columns:1fr;padding:18px}.hero{display:none}.app{display:block}.sidebar{display:none}.main{padding:18px 14px 86px}.topbar{align-items:flex-start;gap:12px}.topbar h1{font-size:24px}.cards,.grid,.two{grid-template-columns:1fr}.list-item,.slot{display:block}.actions{margin-top:10px}.mobile-nav{position:fixed;left:0;right:0;bottom:0;height:66px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-auto-flow:column;z-index:20}.mobile-nav button{background:transparent;font-size:12px;font-weight:900;color:#64748b}.mobile-nav button.active{color:var(--blue)}.week{grid-template-columns:repeat(2,1fr)}.auth-card{padding:20px}.hero-grid{grid-template-columns:1fr}.toolbar input,.toolbar select{min-width:100%}}
  </style>
</head>
<body>
  <div id="toast" class="toast hidden"></div>
  <section id="authPage" class="auth-page">
    <div class="hero">
      <h1>统一登录的<br>在线预约系统</h1>
      <p>面向用户与服务提供者的一体化 Web 平台。商家开放可预约时间段，用户从时间段中选择预约，避免角色混杂与时间冲突。</p>
      <div class="hero-grid"><div class="hero-box"><b>统一入口</b><span>同一登录界面选择身份</span></div><div class="hero-box"><b>商家排期</b><span>商家开放具体时间段</span></div><div class="hero-box"><b>响应式</b><span>桌面端与移动端分层跳转</span></div></div>
    </div>
    <div class="auth-card">
      <div class="auth-title"><h2 id="authTitle">登录系统</h2><span class="tag">Web 预约平台</span></div>
      <div class="role-tabs"><button id="roleUser" class="active" onclick="setAuthRole('user')">用户</button><button id="roleMerchant" onclick="setAuthRole('merchant')">商家</button></div>
      <div class="form">
        <div id="regExtra" class="hidden">
          <div class="field user-only"><label>用户姓名</label><input id="username" placeholder="例如：张三"></div>
          <div class="field merchant-only hidden"><label>店铺名称</label><input id="shopName" placeholder="例如：健康护理中心"></div>
          <div class="field merchant-only hidden"><label>店铺地址</label><input id="shopAddress" placeholder="例如：学校东门商业街 2 楼"></div>
        </div>
        <div class="field"><label>手机号</label><input id="phone" placeholder="测试用户 13311112222 / 商家 13800001111"></div>
        <div class="field"><label>密码</label><input id="password" type="password" placeholder="默认密码 123456"></div>
        <button class="btn" onclick="submitAuth()" id="authBtn">登录</button>
      </div>
      <div class="switch-line"><span id="switchText">还没有账号？</span> <a href="javascript:toggleMode()" id="switchLink">立即注册</a></div>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="sidebar"><div class="brand"><div class="logo">约</div><h2>在线预约系统</h2></div><div id="nav" class="nav"></div><div class="profile"><b id="profileName"></b><div class="small muted" id="profileRole"></div><button class="btn secondary" style="width:100%;margin-top:10px" onclick="logout()">退出登录</button></div></aside>
    <main class="main"><div class="topbar"><div><h1 id="pageTitle">首页</h1><div class="muted" id="pageSub">欢迎使用在线预约系统</div></div><button class="btn secondary" onclick="refreshAll()">刷新数据</button></div><div id="content"></div></main>
    <nav id="mobileNav" class="mobile-nav"></nav>
  </section>

<script>
const $=id=>document.getElementById(id);let mode='login',authRole='user',role='',me=null,view='home';let services=[],slots=[],appointments=[],notes=[],reviews=[],schedule=[];
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2400)}
async function api(url,opt={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opt});const txt=await r.text();let data;try{data=JSON.parse(txt)}catch{data=txt}if(!r.ok)throw new Error(data.message||'请求失败');return data}
function setAuthRole(r){authRole=r;$('roleUser').classList.toggle('active',r==='user');$('roleMerchant').classList.toggle('active',r==='merchant');document.querySelectorAll('.user-only').forEach(e=>e.classList.toggle('hidden',r!=='user'));document.querySelectorAll('.merchant-only').forEach(e=>e.classList.toggle('hidden',r!=='merchant'))}
function toggleMode(){mode=mode==='login'?'register':'login';$('authTitle').textContent=mode==='login'?'登录系统':'注册账号';$('authBtn').textContent=mode==='login'?'登录':'注册';$('regExtra').classList.toggle('hidden',mode==='login');$('switchText').textContent=mode==='login'?'还没有账号？':'已有账号？';$('switchLink').textContent=mode==='login'?'立即注册':'返回登录'}
async function submitAuth(){try{const phone=$('phone').value.trim(),pass=$('password').value;if(authRole==='user'){if(mode==='login'){const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({PhoneNumber:phone,Password:pass})});loginAs('user',d.user)}else{const d=await api('/api/auth/register',{method:'POST',body:JSON.stringify({Username:$('username').value.trim(),PhoneNumber:phone,Password:pass})});loginAs('user',d.user)}}else{if(mode==='login'){const d=await api('/api/merchant/login',{method:'POST',body:JSON.stringify({MerchantPhone:phone,Password:pass})});loginAs('merchant',d.merchant)}else{const d=await api('/api/merchant/register',{method:'POST',body:JSON.stringify({ShopName:$('shopName').value.trim(),Address:$('shopAddress').value.trim(),MerchantPhone:phone,Password:pass})});loginAs('merchant',d.merchant)}}}catch(e){toast(e.message)}}
async function loginAs(r,obj){role=r;me=obj;view='home';$('authPage').classList.add('hidden');$('app').classList.remove('hidden');await refreshAll();renderShell();toast('登录成功')}
function logout(){role='';me=null;$('app').classList.add('hidden');$('authPage').classList.remove('hidden')}
function navs(){return role==='user'?[['home','预约'],['orders','我的预约'],['notes','通知']]:[['home','工作台'],['services','服务'],['slots','时间段'],['orders','预约管理'],['schedule','排班'],['reviews','评价'],['notes','通知']]}
function renderShell(){const ns=navs();$('nav').innerHTML=ns.map(n=>`<button class="${view===n[0]?'active':''}" onclick="go('${n[0]}')">${n[1]}</button>`).join('');$('mobileNav').innerHTML=ns.slice(0,5).map(n=>`<button class="${view===n[0]?'active':''}" onclick="go('${n[0]}')">${n[1]}</button>`).join('');$('profileName').textContent=role==='user'?me.Username:me.ShopName;$('profileRole').textContent=role==='user'?'用户端：只能预约/取消/评价':'商家端：管理服务/时间段/订单';renderView()}
function go(v){view=v;renderShell()}function fmt(s){return (s||'').replace('T',' ').slice(0,16)}function money(n){return '¥'+Number(n||0).toFixed(0)}
async function refreshAll(){try{services=await api(role==='merchant'?`/api/services?MerchantID=${me?.MerchantID||0}`:'/api/services');slots=await api(role==='merchant'?`/api/slots?MerchantID=${me?.MerchantID||0}`:'/api/slots');if(role==='user'){appointments=await api(`/api/appointments?UserID=${me.UserID}`);notes=await api(`/api/user/notifications?UserID=${me.UserID}`)}else if(role==='merchant'){appointments=await api(`/api/appointments?MerchantID=${me.MerchantID}`);notes=await api(`/api/merchant/notifications?MerchantID=${me.MerchantID}`);reviews=await api(`/api/reviews?MerchantID=${me.MerchantID}`);schedule=await api(`/api/merchant/schedule?MerchantID=${me.MerchantID}`)}}catch(e){console.warn(e)}if(role)renderShell()}
function statCards(){return `<div class="cards"><div class="stat"><span class="muted">服务数</span><br><b>${services.length}</b></div><div class="stat"><span class="muted">开放时间段</span><br><b>${slots.length}</b></div><div class="stat"><span class="muted">预约记录</span><br><b>${appointments.length}</b></div></div>`}
function renderView(){let title='首页',html='';if(role==='user'){if(view==='home'){title='预约服务';html=renderUserHome()}if(view==='orders'){title='我的预约';html=renderUserOrders()}if(view==='notes'){title='我的通知';html=renderNotes()}}else{if(view==='home'){title='商家工作台';html=statCards()+renderMerchantOrders(true)}if(view==='services'){title='服务管理';html=renderServices()}if(view==='slots'){title='时间段管理';html=renderSlots()}if(view==='orders'){title='预约管理';html=renderMerchantOrders(false)}if(view==='schedule'){title='排班设置';html=renderSchedule()}if(view==='reviews'){title='用户评价';html=renderReviews()}if(view==='notes'){title='商家通知';html=renderNotes()}}$('pageTitle').textContent=title;$('pageSub').textContent=role==='user'?'统一入口 · 用户端操作区':'统一入口 · 商家端操作区';$('content').innerHTML=html}
function renderUserHome(){return `<div class="panel"><h2>搜索并预约</h2><div class="toolbar"><input id="kw" placeholder="搜索服务、分类、商家"><button class="btn" onclick="searchServices()">搜索</button></div><div id="serviceGrid" class="grid">${serviceCards(services)}</div></div>`}
function serviceCards(list){return list.map(s=>{const ss=slots.filter(x=>x.ServiceID===s.ServiceID&&x.Remaining>0).slice(0,4);return `<div class="card"><h3>${s.ServiceName}</h3><div class="muted small">${s.ShopName} · ${s.Address||'暂无地址'}</div><div class="meta"><span class="tag">${s.Category}</span><span class="tag">${money(s.Price)}</span><span class="tag">${s.Duration}分钟</span><span class="tag">⭐ ${Number(s.AvgRating||0).toFixed(1)}</span></div><div class="small muted">请选择商家开放的可预约时间：</div><div class="slot-list">${ss.length?ss.map(x=>`<div class="slot"><div><b>${x.SlotStart}</b><div class="small muted">至 ${x.SlotEnd} · 剩余 ${x.Remaining}/${x.Capacity}</div></div><button class="btn" onclick="book(${x.SlotID})">预约</button></div>`).join(''):'<div class="small muted">暂无可预约时间段，请等待商家开放。</div>'}</div></div>`}).join('')||'<div class="muted">暂无服务</div>'}
async function searchServices(){const k=$('kw').value.trim();services=await api('/api/services?keyword='+encodeURIComponent(k));slots=await api('/api/slots');$('serviceGrid').innerHTML=serviceCards(services)}
async function book(slotId){try{const d=await api('/api/appointments',{method:'POST',body:JSON.stringify({UserID:me.UserID,SlotID:slotId})});toast(d.message);await refreshAll();go('orders')}catch(e){toast(e.message)}}
function renderUserOrders(){return `<div class="panel"><h2>我的预约</h2><div class="list">${appointments.map(a=>`<div class="list-item"><div><b>${a.ServiceName}</b> <span class="tag">${a.StatusText}</span><div class="muted small">${a.ShopName} · ${a.AppointmentTime}${a.SlotEnd?' - '+a.SlotEnd:''}</div><div class="small">${a.Category} · ${money(a.Price)} · ${a.Duration}分钟</div></div><div class="actions">${(a.Status===1||a.Status===2)?`<button class="btn danger" onclick="cancelUser(${a.AppointmentID})">取消预约</button>`:''}${a.Status===4&&!a.HasReview?`<button class="btn green" onclick="reviewBox(${a.AppointmentID})">评价</button>`:''}</div></div>`).join('')||'<div class="muted">暂无预约</div>'}</div></div><div id="reviewPanel"></div>`}
async function cancelUser(id){try{const d=await api('/api/appointments/cancel',{method:'POST',body:JSON.stringify({AppointmentID:id,UserID:me.UserID})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
function reviewBox(id){$('reviewPanel').innerHTML=`<div class="panel"><h2>提交评价</h2><div class="two"><div class="field"><label>评分</label><select id="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div><div class="field"><label>预约编号</label><input value="${id}" disabled></div></div><div class="field"><label>评价内容</label><textarea id="comment" rows="3" placeholder="请输入评价内容"></textarea></div><button class="btn" onclick="sendReview(${id})">提交评价</button></div>`}
async function sendReview(id){try{const d=await api('/api/reviews',{method:'POST',body:JSON.stringify({AppointmentID:id,UserID:me.UserID,Rating:+$('rating').value,CommentContent:$('comment').value})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
function renderServices(){return `<div class="panel"><h2>发布服务</h2><div class="two"><div class="field"><label>服务名称</label><input id="svcName" placeholder="如 口腔检查"></div><div class="field"><label>分类</label><input id="svcCat" placeholder="医疗/美容/健身"></div><div class="field"><label>价格</label><input id="svcPrice" type="number" value="99"></div><div class="field"><label>服务时长（分钟）</label><input id="svcDur" type="number" value="30"></div><div class="field"><label>默认容量</label><input id="svcCap" type="number" value="1"></div></div><button class="btn" onclick="createService()">发布服务</button></div><div class="panel"><h2>我的服务</h2><div class="grid">${services.map(s=>`<div class="card"><h3>${s.ServiceName}</h3><div class="meta"><span class="tag">${s.Category}</span><span class="tag">${money(s.Price)}</span><span class="tag">${s.Duration}分钟</span><span class="tag">容量 ${s.Capacity}</span></div><button class="btn danger" onclick="delService(${s.ServiceID})">下架服务</button></div>`).join('')||'<div class="muted">暂无服务</div>'}</div></div>`}
async function createService(){try{const d=await api('/api/merchant/service',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,ServiceName:$('svcName').value,Category:$('svcCat').value,Price:+$('svcPrice').value,Duration:+$('svcDur').value,Capacity:+$('svcCap').value})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
async function delService(id){try{const d=await api('/api/merchant/service/delete',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,ServiceID:id})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
function renderSlots(){return `<div class="panel"><h2>开放可预约时间段</h2><p class="muted">时间由商家设置。用户只能从这里开放的时间段中选择预约。</p><div class="two"><div class="field"><label>服务</label><select id="slotSvc">${services.map(s=>`<option value="${s.ServiceID}">${s.ServiceName}（${s.Duration}分钟）</option>`).join('')}</select></div><div class="field"><label>开始时间</label><input id="slotStart" type="datetime-local"></div><div class="field"><label>该时间段容量</label><input id="slotCap" type="number" value="1"></div></div><button class="btn" onclick="createSlot()">开放时间段</button></div><div class="panel"><h2>已开放时间段</h2><div class="list">${slots.map(x=>`<div class="list-item"><div><b>${x.ServiceName}</b><div class="muted small">${x.SlotStart} - ${x.SlotEnd}</div><div class="small">已约 ${x.Booked}/${x.Capacity}，剩余 ${x.Remaining}</div></div><div class="actions"><button class="btn danger" onclick="delSlot(${x.SlotID})">关闭</button></div></div>`).join('')||'<div class="muted">暂无开放时间段</div>'}</div></div>`}
async function createSlot(){try{const start=fmt($('slotStart').value);const d=await api('/api/merchant/slots',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,ServiceID:+$('slotSvc').value,SlotStart:start,Capacity:+$('slotCap').value})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
async function delSlot(id){try{const d=await api('/api/merchant/slots/delete',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,SlotID:id})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
function renderMerchantOrders(limit){const arr=limit?appointments.slice(0,5):appointments;return `<div class="panel"><h2>${limit?'近期预约':'预约管理'}</h2><div class="list">${arr.map(a=>`<div class="list-item"><div><b>${a.ServiceName}</b> <span class="tag">${a.StatusText}</span><div class="muted small">用户：${a.Username} ${a.PhoneNumber} · ${a.AppointmentTime}${a.SlotEnd?' - '+a.SlotEnd:''}</div></div><div class="actions">${a.Status===1?`<button class="btn green" onclick="confirmOrder(${a.AppointmentID})">确认</button>`:''}${a.Status===2?`<button class="btn" onclick="completeOrder(${a.AppointmentID})">核销完成</button>`:''}${(a.Status===1||a.Status===2)?`<button class="btn danger" onclick="cancelMerchant(${a.AppointmentID})">取消</button>`:''}</div></div>`).join('')||'<div class="muted">暂无预约</div>'}</div></div>`}
async function confirmOrder(id){try{const d=await api('/api/merchant/appointments/confirm',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,AppointmentID:id})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
async function completeOrder(id){try{const d=await api('/api/appointments/complete',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,AppointmentID:id})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
async function cancelMerchant(id){try{const d=await api('/api/appointments/cancel',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,AppointmentID:id})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
function renderSchedule(){const names=['周日','周一','周二','周三','周四','周五','周六'];let m=new Map(schedule.map(x=>[x.DayOfWeek,x.IsWorkingDay]));return `<div class="panel"><h2>每周排班</h2><p class="muted">商家休息日不能开放时间段，也不能被用户预约。</p><div class="week">${names.map((n,i)=>`<label><input type="checkbox" id="day${i}" ${m.get(i)?'checked':''}>${n}</label>`).join('')}</div><button class="btn" style="margin-top:14px" onclick="saveSchedule()">保存排班</button></div>`}
async function saveSchedule(){const arr=[0,1,2,3,4,5,6].map(i=>({DayOfWeek:i,IsWorkingDay:$('day'+i).checked?1:0}));try{const d=await api('/api/merchant/schedule',{method:'POST',body:JSON.stringify({MerchantID:me.MerchantID,Schedule:arr})});toast(d.message);await refreshAll()}catch(e){toast(e.message)}}
function renderReviews(){return `<div class="panel"><h2>评价反馈</h2><div class="list">${reviews.map(r=>`<div class="list-item"><div><b>${r.ServiceName}</b> <span class="tag">${'⭐'.repeat(r.Rating)}</span><div class="muted small">${r.Username} · ${r.CreatedAt}</div><div>${r.CommentContent||'用户未填写文字评价'}</div></div></div>`).join('')||'<div class="muted">暂无评价</div>'}</div></div>`}
function renderNotes(){return `<div class="panel"><h2>通知中心</h2><div class="list">${notes.map(n=>`<div class="list-item"><div><b>${n.Message}</b><div class="muted small">预约编号：${n.AppointmentID||'-'} · ${n.CreatedAt}</div></div></div>`).join('')||'<div class="muted">暂无通知</div>'}</div></div>`}
setAuthRole('user');
</script>
</body>
</html>
